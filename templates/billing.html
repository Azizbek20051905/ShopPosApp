{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastIT POS - Billing & Subscription</title>
    <link rel="stylesheet" href="{{ static 'css/style.css' }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body x-data="billingApp()" x-init="init()">
    <nav style="padding: 1rem 0; border-bottom: 1px solid var(--border);">
        <div class="container nav-content">
            <a href="/dashboard" class="logo">
                <i data-lucide="arrow-left" style="color: var(--primary);"></i>
                <span class="gradient-text">Billing</span>
            </a>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-outline" @click="window.location.href='/dashboard'">Back to Terminal</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 4rem;">
        <div style="margin-bottom: 3rem;">
            <h1 style="margin-bottom: 1rem;">Manage <span class="gradient-text">Subscription</span></h1>
            <p style="color: var(--text-secondary);">View your current plan and renewal status.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 4rem;">
            <!-- Current Status -->
            <div class="glass-card">
                <h3 style="margin-bottom: 1.5rem;">Current Plan</h3>
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
                    <div style="width: 48px; height: 48px; background: rgba(99, 102, 241, 0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="award" style="color: var(--primary);"></i>
                    </div>
                    <div>
                        <div style="font-size: 1.25rem; font-weight: 700;" x-text="subscription.plan_name || 'Loading...'"></div>
                        <div style="color: var(--text-secondary);" x-text="'Started: ' + formatDate(subscription.start_date)"></div>
                    </div>
                </div>
                
                <div style="background: rgba(255,255,255,0.03); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="color: var(--text-secondary);">Status</span>
                        <span :class="subscription.is_active ? 'gradient-text' : 'text-danger'" style="font-weight: 700;" x-text="subscription.status.toUpperCase()"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span style="color: var(--text-secondary);">Expires on</span>
                        <span style="font-weight: 600;" x-text="formatDate(subscription.end_date)"></span>
                    </div>
                </div>

                <div x-show="!subscription.is_active || isExpiringSoon()" style="color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 1rem; border-radius: 12px; display: flex; gap: 0.75rem; align-items: center;">
                    <i data-lucide="alert-triangle" style="width: 20px;"></i>
                    <span x-text="subscription.is_active ? 'Your subscription is expiring soon. Renew now to avoid interruption.' : 'Your subscription has expired. Please upgrade to continue.'"></span>
                </div>
            </div>

            <!-- Payment History -->
            <div class="glass-card">
                <h3 style="margin-bottom: 1.5rem;">Recent Payments</h3>
                <div style="max-height: 300px; overflow-y: auto;">
                    <template x-for="pmt in payments" :key="pmt.id">
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border);">
                            <div>
                                <div style="font-weight: 600;" x-text="pmt.provider.toUpperCase()"></div>
                                <div style="font-size: 0.8125rem; color: var(--text-secondary);" x-text="formatDate(pmt.created_at)"></div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-weight: 700;" x-text="formatCurrency(pmt.amount)"></div>
                                <div style="font-size: 0.75rem;" :style="{ color: pmt.status === 'success' ? '#10b981' : '#ef4444' }" x-text="pmt.status.toUpperCase()"></div>
                            </div>
                        </div>
                    </template>
                    <div x-show="payments.length === 0" style="text-align: center; color: var(--text-secondary); padding: 2rem;">
                        No payment history found.
                    </div>
                </div>
            </div>
        </div>

        <h2 style="margin-bottom: 2rem;">Available <span class="gradient-text">Plans</span></h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
            <template x-for="plan in plans" :key="plan.id">
                <div class="glass-card">
                    <h3 x-text="plan.name"></h3>
                    <div style="font-size: 2.5rem; font-weight: 800; margin: 1.5rem 0;">
                        <span x-text="formatCurrency(plan.price)"></span>
                        <span style="font-size: 1rem; color: var(--text-secondary);">/ 30 days</span>
                    </div>
                    <p x-text="plan.description" style="color: var(--text-secondary); margin-bottom: 2rem;"></p>
                    
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <button class="btn btn-primary" @click="handlePayment(plan.id, 'payme')">
                            Pay with Payme
                        </button>
                        <button class="btn btn-outline" @click="handlePayment(plan.id, 'click')">
                            Pay with Click
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function billingApp() {
            return {
                subscription: { status: 'loading...', is_active: true },
                payments: [],
                plans: [
                    { id: 1, name: 'Basic Plan', price: 150000, description: 'Perfect for small stores with basic needs.' },
                    { id: 2, name: 'Standard Plan', price: 300000, description: 'Most popular for growing retail businesses.' },
                    { id: 3, name: 'Premium Plan', price: 500000, description: 'Unlimited everything and priority support.' }
                ],

                async init() {
                    lucide.createIcons();
                    // In a real app, fetch from API. Simulating for now.
                    this.subscription = {
                        plan_name: '7-Day Free Trial',
                        start_date: new Date(),
                        end_date: new Date(Date.now() + 7 * 86400000),
                        status: 'active',
                        is_active: true
                    };
                },

                async handlePayment(planId, provider) {
                    // 1. Initialize payment via API
                    alert(`Initializing ${provider} payment for Plan #${planId}...`);
                    
                    // 2. Mock success for demo
                    const res = await fetch('/api/payments/initialize/', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        },
                        body: JSON.stringify({ plan_id: planId, provider })
                    });
                    
                    const data = await res.json();
                    if (data.payment_id) {
                        alert(`Payment record ${data.payment_id} created. Simulate success...`);
                        
                        const successRes = await fetch('/api/payments/mock-success/', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem('token')}`
                            },
                            body: JSON.stringify({ payment_id: data.payment_id })
                        });
                        
                        const successData = await successRes.json();
                        alert(successData.message);
                        location.reload();
                    }
                },

                formatDate(date) {
                    if (!date) return 'N/A';
                    return new Date(date).toLocaleDateString();
                },

                formatCurrency(amount) {
                    return new Intl.NumberFormat('uz-UZ', { style: 'currency', currency: 'UZS' }).format(amount);
                },

                isExpiringSoon() {
                    if (!this.subscription.end_date) return false;
                    const daysLeft = (new Date(this.subscription.end_date) - new Date()) / 86400000;
                    return daysLeft < 3;
                }
            };
        }
    </script>
</body>
</html>
